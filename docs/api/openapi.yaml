  /api/admin/exam-papers/{id}/questions:
    post:
      tags: [Admin]
      summary: Thêm 1 câu hỏi vào đề thi thử
      description: >-
        `options`/`correctAnswer` phải khớp `questionType` (kiểm tra bởi
        `validateQuestionShape()`): `MCQ_4` → `options` 4 chuỗi,
        `correctAnswer` số 0-3; `TRUE_FALSE_4` → `options` 4 chuỗi,
        `correctAnswer` 4 boolean (theo đúng thứ tự a/b/c/d); `FILL_BLANK` →
        không có `options`, `correctAnswer` mảng ≥1 chuỗi (so khớp sau
        `normalizeAnswer()`).
      security: [{ AdminSecret: [] }]
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExamQuestionInput'
            examples:
              MCQ_4:
                summary: Trắc nghiệm 4 lựa chọn
                value:
                  chapter: 'Hàm số'
                  difficulty: 2
                  questionType: MCQ_4
                  points: 0.25
                  questionText: 'Hàm số y = x^3 - 3x đồng biến trên khoảng nào?'
                  options: ['(-1;1)', '(-∞;-1)', '(1;+∞)', '(-∞;-1) và (1;+∞)']
                  correctAnswer: 3
                  explanation: "y' = 3x^2 - 3 = 3(x-1)(x+1); y' > 0 khi x < -1 hoặc x > 1"
                  examYear: 2024
                  examCode: 'Mã đề 101'
              TRUE_FALSE_4:
                summary: 'Đúng/Sai 4 phát biểu (correctAnswer = 4 boolean)'
                value:
                  chapter: 'Hình học'
                  difficulty: 2
                  questionType: TRUE_FALSE_4
                  points: 1
                  questionText: >-
                    Cho hình chóp S.ABCD có đáy là hình vuông cạnh a, SA
                    vuông góc với đáy, SA = a. Xét tính đúng/sai của các
                    phát biểu sau:
                  options:
                    - 'a) SA vuông góc với BC'
                    - 'b) Góc giữa SC và mặt đáy bằng 45°'
                    - 'c) Thể tích khối chóp S.ABCD bằng a^3/3'
                    - 'd) SC = a√3'
                  correctAnswer: [true, true, false, false]
                  explanation: >-
                    a, b đúng theo tính chất hình chóp đều có cạnh bên vuông
                    góc đáy; c, d sai do tính toán thể tích/độ dài cạnh.
              FILL_BLANK:
                summary: 'Điền đáp án (correctAnswer = mảng đáp án chấp nhận)'
                value:
                  chapter: 'Đại số'
                  difficulty: 1
                  questionType: FILL_BLANK
                  points: 0.5
                  questionText: 'Giải phương trình 2x + 4 = 10. Đáp án: x = ___'
                  correctAnswer: ['x = 3', 'x=3', '3']
      responses:
        '201':
          description: Câu hỏi đã được tạo (`ExamQuestionFullDto`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamQuestionFullDto'
        '400':
          description: 'Lỗi schema Zod, hoặc `options`/`correctAnswer` không khớp `questionType`'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value: { error: INVALID_REQUEST_BODY, message: 'Du lieu khong hop le' }
                invalidShape:
                  value: { error: EXAM_QUESTION_INVALID, message: "Du lieu cau hoi khong hop le voi dang 'MCQ_4'." }
        '401':
          $ref: '#/components/responses/AdminUnauthorized'
        '404':
          description: '`id` (đề thi) không tồn tại'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_PAPER_NOT_FOUND
                message: "Khong tim thay de thi thu '...'."

  /api/admin/exam-papers/{id}/questions/import:
    post:
      tags: [Admin]
      summary: Import câu hỏi từ file Excel (.xlsx/.xls, tối đa 5MB)
      description: >-
        `multipart/form-data`, field `file`. Quy ước cột (xem file mẫu
        `docs/templates/mau-import-cau-hoi-thi-thu.xlsx`, sinh bằng `npm run
        generate:exam-template`): **Chương, Độ khó, Loại câu hỏi, Điểm, Nội
        dung câu hỏi** (bắt buộc); **Lựa chọn 1-4** (dùng cho
        `MCQ_4`/`TRUE_FALSE_4`, bỏ trống với `FILL_BLANK`); **Đáp án đúng**
        (`MCQ_4`: `A`-`D` hoặc `0`-`3`; `TRUE_FALSE_4`: 4 giá trị `D/S` cách
        nhau bởi dấu phẩy, ví dụ `"D,S,D,S"`; `FILL_BLANK`: các đáp án cách
        nhau bởi `|`, ví dụ `"Hà Nội|HN"`); **Giải thích, Năm thi, Mã đề**
        (tùy chọn).
      security: [{ AdminSecret: [] }]
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: >-
            Cho phép THÀNH CÔNG MỘT PHẦN — các dòng hợp lệ vẫn được lưu dù có
            dòng khác lỗi (xử lý tuần tự, không bọc transaction chung). `row`
            tính cả dòng header (dòng 1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamImportResult'
              example:
                inserted: 18
                errors:
                  - row: 5
                    message: "Loai cau hoi 'TRAC_NGHIEM' khong hop le (phai la MCQ_4, TRUE_FALSE_4 hoac FILL_BLANK)."
                  - row: 12
                    message: "Dap an dung 'E' khong hop le (phai la A/B/C/D hoac 0-3)."
        '400':
          description: >-
            Thiếu file, sai định dạng (không đọc được bằng `xlsx`), không có
            sheet/dữ liệu, hoặc vượt 5MB (`MulterError` → 400 qua
            `uploadExcelFile()`, xem fix Review #5)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_IMPORT_FILE_INVALID
                message: 'Loi tai file len: File too large'
        '401':
          $ref: '#/components/responses/AdminUnauthorized'
        '404':
          description: '`id` (đề thi) không tồn tại'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_PAPER_NOT_FOUND
                message: "Khong tim thay de thi thu '...'."

  /api/admin/exam-papers/{id}/questions/{qid}:
    patch:
      tags: [Admin]
      summary: Cập nhật 1 câu hỏi (partial update)
      description: >-
        ⚠️ Endpoint đã implement đầy đủ ở backend nhưng hiện **CHƯA có nơi
        nào ở frontend gọi tới** (`frontend/src/lib/api.ts` không có
        `adminUpdateExamQuestion`, `AdminExamPaperDetailPage` chỉ có nút
        "Xoá"). Xem `docs/FEATURE_LOG.md` Section 6 — Ghi chú kỹ thuật #11.
        Nếu request có `questionType`/`options`/`correctAnswer`, server
        validate lại toàn bộ shape theo dạng câu hỏi MỚI (lấy giá trị cũ cho
        field không đổi).
      security: [{ AdminSecret: [] }]
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExamQuestionInput'
            example:
              explanation: 'Giải thích đã được cập nhật rõ hơn...'
      responses:
        '200':
          description: Câu hỏi sau khi cập nhật (`ExamQuestionFullDto`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamQuestionFullDto'
        '400':
          description: 'Lỗi schema Zod (partial), hoặc sau khi áp input mới `options`/`correctAnswer` không khớp `questionType`'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value: { error: INVALID_REQUEST_BODY, message: 'Du lieu khong hop le' }
                invalidShape:
                  value: { error: EXAM_QUESTION_INVALID, message: "Du lieu cau hoi khong hop le voi dang 'MCQ_4'." }
        '401':
          $ref: '#/components/responses/AdminUnauthorized'
        '404':
          description: '`qid` không tồn tại hoặc không thuộc đề `id`'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_QUESTION_NOT_FOUND
                message: "Khong tim thay cau hoi '...'."
    delete:
      tags: [Admin]
      summary: Ẩn 1 câu hỏi (soft delete — set isActive=false)
      description: >-
        Giữ lại bản ghi để không phá vỡ lịch sử chấm điểm các phiên đã làm
        câu này.
      security: [{ AdminSecret: [] }]
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Đã ẩn câu hỏi
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: 'Da an cau hoi thanh cong.' }
        '401':
          $ref: '#/components/responses/AdminUnauthorized'
        '404':
          description: '`qid` không tồn tại hoặc không thuộc đề `id`'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_QUESTION_NOT_FOUND
                message: "Khong tim thay cau hoi '...'."

components:
  securitySchemes:
    SessionToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Session token nội bộ nhận được sau khi đăng nhập Firebase (xem Section 3 - Auth)
    AdminSecret:
      type: apiKey
      in: header
      name: X-Admin-Secret
      description: Giá trị biến môi trường `ADMIN_SECRET`

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    AdminUnauthorized:
      description: Thiếu hoặc sai `X-Admin-Secret`
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: ADMIN_UNAUTHORIZED
            message: 'Khong co quyen truy cap.'

  schemas:
    SubjectId:
      type: string
      enum: [TOAN, VAN, ANH, LY, HOA, SINH, SU, DIA, GDCD]

    ReportReason:
      type: string
      enum: [WRONG_ANSWER, BAD_CONTENT, TYPO, OTHER]

    ReportStatus:
      type: string
      enum: [PENDING, REVIEWED, FIXED, DISMISSED]

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Mã lỗi (dùng để ánh xạ HTTP status, xem `app.ts`)
        message:
          type: string
        details:
          type: array
          description: Chỉ có khi `error = INVALID_REQUEST_BODY` (lỗi Zod)
          items:
            type: object
            properties:
              path:
                type: array
                items: {}
              message:
                type: string

    QuestionPublicDto:
      type: object
      description: Câu hỏi gửi cho user khi bắt đầu/resume phiên — KHÔNG có correctAnswer/explanation
      properties:
        id: { type: string, format: uuid }
        subject: { $ref: '#/components/schemas/SubjectId' }
        chapter: { type: string, nullable: true }
        difficulty: { type: integer, enum: [1, 2, 3] }
        question: { type: string }
        options:
          type: array
          items: { type: string }
          minItems: 4
          maxItems: 4

    QuestionFullDto:
      allOf:
        - $ref: '#/components/schemas/QuestionPublicDto'
        - type: object
          properties:
            correctAnswer: { type: integer, minimum: 0, maximum: 3 }
            explanation: { type: string, nullable: true }
            examYear: { type: integer, nullable: true }
            examCode: { type: string, nullable: true }
            isActive: { type: boolean }
            createdAt: { type: string, format: date-time }

    CreateQuestionInput:
      type: object
      required: [subject, difficulty, question, options, correctAnswer]
      properties:
        subject: { $ref: '#/components/schemas/SubjectId' }
        chapter: { type: string, maxLength: 200 }
        difficulty: { type: integer, enum: [1, 2, 3] }
        question: { type: string, minLength: 5, maxLength: 2000 }
        options:
          type: array
          items: { type: string, minLength: 1 }
          minItems: 4
          maxItems: 4
        correctAnswer: { type: integer, minimum: 0, maximum: 3 }
        explanation: { type: string, maxLength: 2000 }
        examYear: { type: integer, minimum: 2000, maximum: 2100 }
        examCode: { type: string, maxLength: 50 }

    UpdateQuestionInput:
      allOf:
        - $ref: '#/components/schemas/CreateQuestionInput'
      description: Tất cả field đều tùy chọn (partial update)

    StartSessionResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        subjectId: { $ref: '#/components/schemas/SubjectId' }
        questions:
          type: array
          items: { $ref: '#/components/schemas/QuestionPublicDto' }
          minItems: 15
          maxItems: 15
        timeLimitSeconds:
          type: integer
          example: 1020
          description: 17 phút (15 phút làm bài + 2 phút buffer)
        startedAt: { type: string, format: date-time }

    AnswerRequest:
      type: object
      required: [sessionId, questionId, selectedOption]
      properties:
        sessionId: { type: string, format: uuid }
        questionId: { type: string, format: uuid }
        selectedOption: { type: integer, minimum: 0, maximum: 3 }

    AnswerResponse:
      type: object
      properties:
        isCorrect: { type: boolean }
        correctAnswer: { type: integer }
        explanation: { type: string, nullable: true }
        answeredCount:
          type: integer
          description: Số câu đã trả lời trong phiên này
        totalQuestions:
          type: integer
          example: 15

    AnswerSummary:
      type: object
      properties:
        questionId: { type: string, format: uuid }
        selectedOption: { type: integer, nullable: true }
        isCorrect: { type: boolean }
        correctAnswer: { type: integer }
        explanation: { type: string, nullable: true }

    CompleteSessionResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        score: { type: integer, example: 12 }
        pointsEarned: { type: integer, example: 12 }
        totalQuestions: { type: integer, example: 15 }
        answers:
          type: array
          items: { $ref: '#/components/schemas/AnswerSummary' }

    SessionDetailResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        subjectId: { $ref: '#/components/schemas/SubjectId' }
        questions:
          type: array
          items: { $ref: '#/components/schemas/QuestionPublicDto' }
        answers:
          type: array
          items:
            type: object
            properties:
              questionId: { type: string, format: uuid }
              selectedOption: { type: integer, nullable: true }
              isCorrect: { type: boolean }
        timeRemainingSeconds:
          type: integer
          description: Có thể âm nếu đã quá giờ nhưng chưa complete
        startedAt: { type: string, format: date-time }

    HistoryItem:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        subjectId: { $ref: '#/components/schemas/SubjectId' }
        score: { type: integer }
        pointsEarned: { type: integer }
        totalQuestions: { type: integer }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }

    PaginatedHistory:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HistoryItem' }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    PracticeStats:
      type: object
      properties:
        subject: { $ref: '#/components/schemas/SubjectId' }
        totalSessions: { type: integer }
        avgScore: { type: number }
        bestScore: { type: integer }
        accuracyByDifficulty:
          type: object
          description: 'Tỉ lệ đúng (0.0–1.0) theo độ khó, key là "1"|"2"|"3"'
          additionalProperties: { type: number }
          example: { '1': 0.96, '2': 0.74, '3': 0.52 }

    ReportQuestionRequest:
      type: object
      required: [reason]
      properties:
        reason: { $ref: '#/components/schemas/ReportReason' }
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Mô tả thêm, không bắt buộc

    QuestionReportDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        questionId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        reason: { $ref: '#/components/schemas/ReportReason' }
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ReportStatus' }
        createdAt: { type: string, format: date-time }

    QuestionReportSummary:
      type: object
      description: >-
        Response của GET /api/admin/questions/reports/summary
        (shape mới — flatten, thay cho `{ byStatus, topReportedQuestions }` cũ)
      properties:
        pending: { type: integer }
        reviewed: { type: integer }
        fixed: { type: integer }
        dismissed: { type: integer }
        topReportedQuestions:
          type: array
          description: Top 10 câu bị báo cáo nhiều nhất (mọi trạng thái), giảm dần theo count
          items:
            type: object
            properties:
              questionId: { type: string, format: uuid }
              count: { type: integer }

    # ───────────────────────── Exam (Thi thử) ─────────────────────────
    ExamQuestionType:
      type: string
      enum: [MCQ_4, TRUE_FALSE_4, FILL_BLANK]

    ExamSessionStatus:
      type: string
      enum: [IN_PROGRESS, COMPLETED, EXPIRED]

    ExamQuestionOptions:
      description: >-
        4 lựa chọn (MCQ_4) hoặc 4 phát biểu (TRUE_FALSE_4); null với
        FILL_BLANK.
      nullable: true
      type: array
      items: { type: string }

    ExamCorrectAnswer:
      description: >-
        Đáp án đúng — kiểu dữ liệu phụ thuộc `questionType`: MCQ_4 là số
        nguyên 0-3, TRUE_FALSE_4 là mảng 4 boolean (theo đúng thứ tự options
        a/b/c/d), FILL_BLANK là mảng ≥1 chuỗi (các đáp án được chấp nhận, so
        khớp sau `normalizeAnswer()`).
      oneOf:
        - type: integer
          minimum: 0
          maximum: 3
        - type: array
          items: { type: boolean }
          minItems: 4
          maxItems: 4
        - type: array
          items: { type: string }
          minItems: 1

    ExamSelectedAnswer:
      description: >-
        Đáp án học sinh chọn — kiểu dữ liệu phụ thuộc `questionType`: MCQ_4
        là số nguyên 0-3, TRUE_FALSE_4 là mảng 4 boolean, FILL_BLANK là
        chuỗi. Gửi `{}` cho câu chưa trả lời (sentinel, luôn được tính là
        sai).
      oneOf:
        - type: integer
        - type: string
        - type: array
          items: { type: boolean }
        - type: object
          description: 'Sentinel cho câu chưa trả lời: `{}`'

    ExamQuestionPublicDto:
      type: object
      description: >-
        Câu hỏi gửi cho học sinh khi bắt đầu phiên — ẨN
        `correctAnswer`/`explanation`.
      properties:
        id: { type: string, format: uuid }
        chapter: { type: string, nullable: true }
        difficulty: { type: integer, enum: [1, 2, 3] }
        questionType: { $ref: '#/components/schemas/ExamQuestionType' }
        points: { type: number, example: 0.25 }
        questionText: { type: string }
        options: { $ref: '#/components/schemas/ExamQuestionOptions' }

    ExamQuestionFullDto:
      allOf:
        - $ref: '#/components/schemas/ExamQuestionPublicDto'
        - type: object
          properties:
            examPaperId: { type: string, format: uuid }
            correctAnswer: { $ref: '#/components/schemas/ExamCorrectAnswer' }
            explanation: { type: string, nullable: true }
            examYear: { type: integer, nullable: true }
            examCode: { type: string, nullable: true }
            isActive: { type: boolean }
            createdAt: { type: string, format: date-time }

    ExamPaperSummaryDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject: { $ref: '#/components/schemas/SubjectId' }
        title: { type: string }
        durationMinutes: { type: integer }
        isActive: { type: boolean }
        questionCount:
          type: integer
          description: Số câu hỏi ĐANG KÍCH HOẠT (isActive=true) trong đề
        createdAt: { type: string, format: date-time }

    ExamPaperDetailDto:
      allOf:
        - $ref: '#/components/schemas/ExamPaperSummaryDto'
        - type: object
          properties:
            questions:
              type: array
              description: Toàn bộ câu hỏi (kể cả isActive=false), kèm đáp án đúng
              items: { $ref: '#/components/schemas/ExamQuestionFullDto' }

    CreateExamPaperInput:
      type: object
      required: [subject, title, durationMinutes]
      properties:
        subject: { $ref: '#/components/schemas/SubjectId' }
        title: { type: string, minLength: 1, maxLength: 300 }
        durationMinutes: { type: integer, minimum: 1, maximum: 600 }

    UpdateExamPaperInput:
      type: object
      description: Tất cả field đều tùy chọn (partial update)
      properties:
        title: { type: string, minLength: 1, maxLength: 300 }
        durationMinutes: { type: integer, minimum: 1, maximum: 600 }
        isActive: { type: boolean }

    CreateExamQuestionInput:
      type: object
      required: [difficulty, questionType, points, questionText, correctAnswer]
      properties:
        chapter: { type: string, maxLength: 200 }
        difficulty: { type: integer, enum: [1, 2, 3] }
        questionType: { $ref: '#/components/schemas/ExamQuestionType' }
        points: { type: number, exclusiveMinimum: 0, example: 0.25 }
        questionText: { type: string, minLength: 1, maxLength: 4000 }
        options:
          type: array
          items: { type: string, minLength: 1 }
          minItems: 4
          maxItems: 4
          description: 'Bắt buộc với MCQ_4/TRUE_FALSE_4, không gửi với FILL_BLANK'
        correctAnswer: { $ref: '#/components/schemas/ExamCorrectAnswer' }
        explanation: { type: string, maxLength: 4000 }
        examYear: { type: integer, minimum: 2000, maximum: 2100 }
        examCode: { type: string, maxLength: 50 }

    UpdateExamQuestionInput:
      allOf:
        - $ref: '#/components/schemas/CreateExamQuestionInput'
      description: Tất cả field đều tùy chọn (partial update)

    StartExamRequest:
      type: object
      required: [subject]
      properties:
        subject: { $ref: '#/components/schemas/SubjectId' }

    StartExamResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        examPaperId: { type: string, format: uuid }
        subject: { $ref: '#/components/schemas/SubjectId' }
        title: { type: string }
        durationMinutes: { type: integer }
        startedAt: { type: string, format: date-time }
        questions:
          type: array
          items: { $ref: '#/components/schemas/ExamQuestionPublicDto' }

    SubmitExamRequest:
      type: object
      required: [sessionId, answers]
      properties:
        sessionId: { type: string, format: uuid }
        answers:
          type: array
          items:
            type: object
            required: [examQuestionId, selectedAnswer]
            properties:
              examQuestionId: { type: string, format: uuid }
              selectedAnswer: { $ref: '#/components/schemas/ExamSelectedAnswer' }

    SubmitExamResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        score:
          type: number
          description: Điểm theo thang 10 (1 chữ số thập phân)
          example: 7.1
        pointsAwarded:
          type: integer
          description: Điểm tích lũy được thưởng (0/10/20/50/120)
          example: 10

    ExamChapterAnalysis:
      type: object
      properties:
        chapter:
          type: string
          description: '"Khác" nếu câu hỏi không gán chương'
          example: 'Hàm số'
        correctCount:
          type: integer
          description: Số câu làm ĐÚNG HOÀN TOÀN (đạt trọn điểm) trong chương này
        totalCount: { type: integer }
        pointsEarned: { type: number }
        pointsTotal: { type: number }

    ExamWrongAnswerItem:
      type: object
      description: >-
        1 câu chưa đạt trọn điểm (pointsEarned < points), kèm đáp án đúng +
        giải thích
      properties:
        examQuestionId: { type: string, format: uuid }
        questionText: { type: string }
        questionType: { $ref: '#/components/schemas/ExamQuestionType' }
        chapter: { type: string, nullable: true }
        options: { $ref: '#/components/schemas/ExamQuestionOptions' }
        correctAnswer: { $ref: '#/components/schemas/ExamCorrectAnswer' }
        selectedAnswer: { $ref: '#/components/schemas/ExamSelectedAnswer' }
        explanation: { type: string, nullable: true }
        points: { type: number }
        pointsEarned: { type: number }

    ExamResultResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/ExamSessionStatus' }
        score: { type: number }
        pointsAwarded: { type: integer }
        totalQuestions: { type: integer }
        chapterAnalysis:
          type: array
          items: { $ref: '#/components/schemas/ExamChapterAnalysis' }
        wrongAnswers:
          type: array
          items: { $ref: '#/components/schemas/ExamWrongAnswerItem' }

    ExamImportRowError:
      type: object
      properties:
        row:
          type: integer
          description: Số thứ tự dòng trong file Excel (tính cả dòng header = dòng 1)
        message: { type: string }

    ExamImportResult:
      type: object
      properties:
        inserted: { type: integer }
        errors:
          type: array
          items: { $ref: '#/components/schemas/ExamImportRowError' }
