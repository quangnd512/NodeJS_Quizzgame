  /api/admin/exam-papers/{id}/questions:
    post:
      tags: [Admin]
      summary: Thêm 1 câu hỏi vào đề thi thử
      description: >-
        `options`/`correctAnswer` phải khớp `questionType` (kiểm tra bởi
        `validateQuestionShape()`): `MCQ_4` → `options` 4 chuỗi,
        `correctAnswer` số 0-3; `TRUE_FALSE_4` → `options` 4 chuỗi,
        `correctAnswer` 4 boolean (theo đúng thứ tự a/b/c/d); `FILL_BLANK` →
        không có `options`, `correctAnswer` mảng ≥1 chuỗi (so khớp sau
        `normalizeAnswer()`).
      security: [{ AdminSecret: [] }]
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExamQuestionInput'
            examples:
              MCQ_4:
                summary: Trắc nghiệm 4 lựa chọn
                value:
                  chapter: 'Hàm số'
                  difficulty: 2
                  questionType: MCQ_4
                  points: 0.25
                  questionText: 'Hàm số y = x^3 - 3x đồng biến trên khoảng nào?'
                  options: ['(-1;1)', '(-∞;-1)', '(1;+∞)', '(-∞;-1) và (1;+∞)']
                  correctAnswer: 3
                  explanation: "y' = 3x^2 - 3 = 3(x-1)(x+1); y' > 0 khi x < -1 hoặc x > 1"
                  examYear: 2024
                  examCode: 'Mã đề 101'
              TRUE_FALSE_4:
                summary: 'Đúng/Sai 4 phát biểu (correctAnswer = 4 boolean)'
                value:
                  chapter: 'Hình học'
                  difficulty: 2
                  questionType: TRUE_FALSE_4
                  points: 1
                  questionText: >-
                    Cho hình chóp S.ABCD có đáy là hình vuông cạnh a, SA
                    vuông góc với đáy, SA = a. Xét tính đúng/sai của các
                    phát biểu sau:
                  options:
                    - 'a) SA vuông góc với BC'
                    - 'b) Góc giữa SC và mặt đáy bằng 45°'
                    - 'c) Thể tích khối chóp S.ABCD bằng a^3/3'
                    - 'd) SC = a√3'
                  correctAnswer: [true, true, false, false]
                  explanation: >-
                    a, b đúng theo tính chất hình chóp đều có cạnh bên vuông
                    góc đáy; c, d sai do tính toán thể tích/độ dài cạnh.
              FILL_BLANK:
                summary: 'Điền đáp án (correctAnswer = mảng đáp án chấp nhận)'
                value:
                  chapter: 'Đại số'
                  difficulty: 1
                  questionType: FILL_BLANK
                  points: 0.5
                  questionText: 'Giải phương trình 2x + 4 = 10. Đáp án: x = ___'
                  correctAnswer: ['x = 3', 'x=3', '3']
      responses:
        '201':
          description: Câu hỏi đã được tạo (`ExamQuestionFullDto`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamQuestionFullDto'
        '400':
          description: 'Lỗi schema Zod, hoặc `options`/`correctAnswer` không khớp `questionType`'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value: { error: INVALID_REQUEST_BODY, message: 'Du lieu khong hop le' }
                invalidShape:
                  value: { error: EXAM_QUESTION_INVALID, message: "Du lieu cau hoi khong hop le voi dang 'MCQ_4'." }
        '401':
          $ref: '#/components/responses/AdminUnauthorized'
        '404':
          description: '`id` (đề thi) không tồn tại'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_PAPER_NOT_FOUND
                message: "Khong tim thay de thi thu '...'."

  /api/admin/exam-papers/{id}/questions/import:
    post:
      tags: [Admin]
      summary: Import câu hỏi từ file Excel (.xlsx/.xls, tối đa 5MB)
      description: >-
        `multipart/form-data`, field `file`. Quy ước cột (xem file mẫu
        `docs/templates/mau-import-cau-hoi-thi-thu.xlsx`, sinh bằng `npm run
        generate:exam-template`): **Chương, Độ khó, Loại câu hỏi, Điểm, Nội
        dung câu hỏi** (bắt buộc); **Lựa chọn 1-4** (dùng cho
        `MCQ_4`/`TRUE_FALSE_4`, bỏ trống với `FILL_BLANK`); **Đáp án đúng**
        (`MCQ_4`: `A`-`D` hoặc `0`-`3`; `TRUE_FALSE_4`: 4 giá trị `D/S` cách
        nhau bởi dấu phẩy, ví dụ `"D,S,D,S"`; `FILL_BLANK`: các đáp án cách
        nhau bởi `|`, ví dụ `"Hà Nội|HN"`); **Giải thích, Năm thi, Mã đề**
        (tùy chọn).
      security: [{ AdminSecret: [] }]
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: >-
            Cho phép THÀNH CÔNG MỘT PHẦN — các dòng hợp lệ vẫn được lưu dù có
            dòng khác lỗi (xử lý tuần tự, không bọc transaction chung). `row`
            tính cả dòng header (dòng 1).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamImportResult'
              example:
                inserted: 18
                errors:
                  - row: 5
                    message: "Loai cau hoi 'TRAC_NGHIEM' khong hop le (phai la MCQ_4, TRUE_FALSE_4 hoac FILL_BLANK)."
                  - row: 12
                    message: "Dap an dung 'E' khong hop le (phai la A/B/C/D hoac 0-3)."
        '400':
          description: >-
            Thiếu file, sai định dạng (không đọc được bằng `xlsx`), không có
            sheet/dữ liệu, hoặc vượt 5MB (`MulterError` → 400 qua
            `uploadExcelFile()`, xem fix Review #5)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_IMPORT_FILE_INVALID
                message: 'Loi tai file len: File too large'
        '401':
          $ref: '#/components/responses/AdminUnauthorized'
        '404':
          description: '`id` (đề thi) không tồn tại'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EXAM_PAPER_NOT_FOUND
                message: "Khong tim thay de thi thu '...'."

